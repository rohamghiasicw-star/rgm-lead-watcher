name: RGM Lead Watcher

# Runs every 15 minutes on GitHub's servers (works while your laptop is off).
# NOTE: on a PRIVATE repo this is ~2,880 min/month, just over the free 2,000 -
# roughly $5-7/mo. Make the repo Public for unlimited free minutes, or widen to
# */30 to stay free. GitHub cron is UTC and can lag; the 20-min lookback covers it.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:       # lets you run it manually from the Actions tab
    inputs:
      selftest:
        description: "Run connection self-test (sends a Telegram check message)"
        type: boolean
        default: false

# Avoid overlapping runs if one is slow.
concurrency:
  group: lead-watcher
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run lead poller
        env:
          COMPOSIO_CONSUMER_KEY: ${{ secrets.COMPOSIO_CONSUMER_KEY }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python poller.py ${{ inputs.selftest && '--selftest' || '' }}
