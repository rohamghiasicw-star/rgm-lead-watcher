name: RGM Lead Watcher

# True 15-minute polling, free, laptop-off.
# GitHub's scheduled-cron is throttled (fires ~hourly, not every 15 min), so we do
# NOT rely on it for cadence. Instead each run LOOPS internally - poll, sleep 15 min,
# repeat - for ~5.7h (just under GitHub's 6h job cap). The schedule + a fresh trigger
# simply (re)start the loop; cancel-in-progress means a new start replaces the old one,
# so exactly one loop is always polling every 15 min. State is committed each cycle so
# a restart resumes seamlessly and never double-alerts.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      selftest:
        description: "Run connection self-test (sends a Telegram check) instead of the loop"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: lead-watcher
  cancel-in-progress: true

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 350          # under the 6h cap; the loop exits before this
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Poll every 15 minutes
        env:
          COMPOSIO_CONSUMER_KEY: ${{ secrets.COMPOSIO_CONSUMER_KEY }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set +e
          if [ "${{ inputs.selftest }}" = "true" ]; then
            python poller.py --selftest
            exit $?
          fi
          git config user.name "rgm-lead-watcher"
          git config user.email "actions@users.noreply.github.com"
          END=$(( $(date +%s) + 20400 ))    # ~5h40m, then exit & get restarted by the schedule
          i=0
          while [ "$(date +%s)" -lt "$END" ]; do
            echo "::group::poll $(date -u +%FT%TZ) i=$i"
            # speed-critical channels every ~60s; full sweep (incl. 6 cold inboxes) every ~5 min
            if [ $(( i % 5 )) -eq 0 ]; then python poller.py || true; else python poller.py --fast || true; fi
            # persist state ~every 5 min so a restart resumes without re-alerting
            if [ $(( i % 5 )) -eq 0 ] && [ -n "$(git status --porcelain state.json)" ]; then
              git add state.json
              git commit -m "state [skip ci]" >/dev/null 2>&1
              git pull --rebase --autostash >/dev/null 2>&1
              git push >/dev/null 2>&1 || true
            fi
            echo "::endgroup::"
            i=$(( i + 1 ))
            sleep 60
          done
